# Cloudflare Workers config — deploys src/index.js as a Worker.
# Tip: from this folder, just run `npm run deploy` (or `npm run dev` to test).
# Free tier covers 100,000 requests/day at no cost.

name = "highlighter-share"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Optional: pin to a workers.dev subdomain for free hosting at
#   https://highlighter-share.<account>.workers.dev
# Set to false here and configure a custom domain via the dashboard if
# you'd rather have e.g. share.yourdomain.com.
workers_dev = true

# KV namespace for short-link storage. Each share gets a random 8-char id
# whose value is the gzipped+base64 payload, retained for 1 year.
[[kv_namespaces]]
binding = "HIGHLIGHTS"
id = "561bdc02f8784f9d8b252ef30e2304ca"
