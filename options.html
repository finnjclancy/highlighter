<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Design Studio</title>
  <style>
    :root {
      --bg: #0c0c0e;
      --bg-2: #131316;
      --surface: #18181b;
      --surface-2: #1f1f23;
      --border: rgba(255,255,255,0.05);
      --border-strong: rgba(255,255,255,0.1);
      --text: #fafafa;
      --text-2: rgba(250,250,250,0.62);
      --text-3: rgba(250,250,250,0.4);
      --text-4: rgba(250,250,250,0.28);
      --accent: #6366f1;
      --accent-soft: rgba(99,102,241,0.15);
      --accent-hover: #5457e0;
      --danger: #ef4444;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      font-feature-settings: "cv11", "ss01";
      background: var(--bg);
      color: var(--text);
      letter-spacing: -0.01em;
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }
    ::selection { background: var(--accent-soft); }

    .wrap { max-width: 880px; margin: 0 auto; padding: 28px 32px 80px; }
    header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 4px;
    }
    .logo {
      width: 26px; height: 26px;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      border-radius: 7px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 13px;
    }
    h1 {
      font-size: 18px; margin: 0; font-weight: 600;
      letter-spacing: -0.02em;
    }
    p.lead {
      color: var(--text-3); margin: 4px 0 22px 36px;
      font-size: 13px;
    }

    .section-lbl {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-4); margin: 18px 0 8px;
      font-weight: 600;
    }

    .preview-strip {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      margin-bottom: 6px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-2);
    }
    .preview-strip span.mark { padding: 1px 4px; border-radius: 3px; font-weight: 500; }

    .presets { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
    .preset {
      cursor: pointer;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 6px 10px;
      font-size: 12px; font-weight: 500;
      color: var(--text-2);
      display: flex; align-items: center; gap: 7px;
      font-family: inherit;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      letter-spacing: -0.005em;
    }
    .preset:hover { border-color: var(--accent); color: var(--text); background: var(--surface-2); }
    .preset .dots { display: flex; gap: 2px; }
    .preset .dot { width: 8px; height: 8px; border-radius: 2px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(208px, 1fr));
      gap: 8px;
      margin-bottom: 6px;
    }
    .card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 10px;
      position: relative;
      transition: border-color 0.15s, transform 0.1s;
    }
    .card:hover { border-color: var(--border-strong); }
    .card.dragging { opacity: 0.4; }

    .swatch-preview {
      border-radius: var(--radius-md);
      padding: 14px 12px;
      font-size: 14px; font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }
    .name-input {
      width: 100%;
      background: transparent; border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text); font-size: 12px; font-weight: 500;
      padding: 4px 0; margin-bottom: 8px;
      font-family: inherit;
      letter-spacing: -0.005em;
      transition: border-color 0.12s;
    }
    .name-input:focus { outline: none; border-color: var(--accent); }

    .color-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 0;
      font-size: 11px;
    }
    .color-row .label { color: var(--text-3); font-weight: 500; }
    .color-row .ctrl { display: flex; gap: 4px; align-items: center; }
    .color-row input[type=color] {
      width: 24px; height: 22px;
      border: 1px solid var(--border);
      border-radius: 5px; padding: 0; cursor: pointer; background: transparent;
    }
    .color-row input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
    .color-row input[type=color]::-webkit-color-swatch { border: none; border-radius: 3px; }
    .color-row input[type=text] {
      width: 72px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text); border-radius: 5px;
      padding: 3px 6px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 10px;
      transition: border-color 0.12s, background 0.12s;
    }
    .color-row input[type=text]:focus { outline: none; border-color: var(--accent); background: var(--surface-2); }

    .card-actions {
      display: flex; gap: 4px; justify-content: space-between;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-2);
      border-radius: 5px; padding: 4px 8px; cursor: pointer;
      font-size: 11px; font-weight: 500;
      font-family: inherit;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .icon-btn:hover { background: var(--surface); color: var(--text); border-color: var(--border-strong); }
    .icon-btn.danger:hover {
      background: rgba(239,68,68,0.12);
      color: #fca5a5;
      border-color: rgba(239,68,68,0.3);
    }

    .add-card {
      background: transparent;
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius-lg);
      color: var(--text-3);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 500; font-family: inherit;
      letter-spacing: -0.005em;
      min-height: 150px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .add-card:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(99,102,241,0.04);
    }

    .footbar {
      position: sticky; bottom: 0;
      margin: 16px -32px 0;
      padding: 12px 32px;
      background: rgba(12,12,14,0.92);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center;
    }
    .btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 7px 14px; cursor: pointer;
      font-size: 12px; font-weight: 500;
      font-family: inherit;
      letter-spacing: -0.005em;
      transition: background 0.12s, border-color 0.12s;
    }
    .btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .status {
      color: #4ade80; font-size: 12px; font-weight: 500;
      margin-left: 4px; opacity: 0; transition: opacity 0.3s;
    }
    .status.show { opacity: 1; }
    .spacer { flex: 1; }
    .hint { font-size: 11px; color: var(--text-4); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="logo">✦</span>
      <h1>Design Studio</h1>
    </header>
    <p class="lead">Each swatch defines its own background and text color.</p>

    <div class="section-lbl">Live preview</div>
    <div class="preview-strip"><span id="sample"></span></div>

    <div class="section-lbl">Presets</div>
    <div class="presets" id="presets"></div>

    <div class="section-lbl">Palette</div>
    <div class="grid" id="grid"></div>

    <div class="footbar">
      <button class="btn primary" id="save">Save changes</button>
      <button class="btn" id="reset">Reset</button>
      <span class="status" id="status">✓ Saved</span>
      <span class="spacer"></span>
      <span class="hint">Drag cards to reorder</span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
