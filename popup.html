<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #0e0e10;
      --surface: #18181b;
      --border: rgba(255,255,255,0.06);
      --border-strong: rgba(255,255,255,0.1);
      --text: #fafafa;
      --text-2: rgba(250,250,250,0.6);
      --text-3: rgba(250,250,250,0.4);
      --accent: #6366f1;
      --accent-hover: #5457e0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 264px;
      font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      font-feature-settings: "cv11", "ss01";
      background: var(--bg);
      color: var(--text);
      letter-spacing: -0.01em;
    }
    header {
      padding: 14px 14px 12px;
      display: flex; align-items: center; gap: 8px;
    }
    header .logo {
      width: 22px; height: 22px;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      border-radius: 6px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 12px;
    }
    header h1 { font-size: 13px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }

    .stats {
      display: flex; gap: 6px; padding: 0 10px 10px;
    }
    .stat {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .stat-num {
      font-size: 18px; font-weight: 600; letter-spacing: -0.02em;
      font-feature-settings: "tnum";
      line-height: 1.1;
    }
    .stat-lbl {
      font-size: 10px; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.06em;
      font-weight: 500;
      margin-top: 2px;
    }
    .actions { padding: 0 10px 10px; display: flex; flex-direction: column; gap: 4px; }
    button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 12px; font-weight: 500;
      text-align: left;
      display: flex; align-items: center; gap: 9px;
      font-family: inherit;
      letter-spacing: -0.005em;
      transition: background 0.12s, border-color 0.12s, transform 0.06s;
    }
    button:hover { background: #1f1f23; border-color: var(--border-strong); }
    button:active { transform: scale(0.98); }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .ico {
      width: 16px; height: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 13px;
      opacity: 0.85;
    }
    button.primary .ico { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <span class="logo">✦</span>
    <h1>Highlighter</h1>
  </header>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="count-page">0</div><div class="stat-lbl">This page</div></div>
    <div class="stat"><div class="stat-num" id="count-all">0</div><div class="stat-lbl">All time</div></div>
  </div>
  <div class="actions">
    <button class="primary" id="open-library"><span class="ico">📚</span> Open library / design</button>
    <button id="toggle-draw"><span class="ico">✎</span> Draw on page</button>
    <button id="share-text"><span class="ico">📋</span> Copy text</button>
    <button id="share-link"><span class="ico">🔗</span> Share live link</button>
    <button id="toggle-panel"><span class="ico">⇆</span> Toggle overlay</button>
    <div id="toast" style="display:none;margin:6px 10px 0;padding:6px 10px;border-radius:6px;background:rgba(99,102,241,0.18);border:1px solid rgba(99,102,241,0.4);font-size:11px;color:#cfd2ff;text-align:center;letter-spacing:-0.005em;"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
