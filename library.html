<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Highlighter</title>
  <style>
    :root {
      --bg: #0c0c0e;
      --bg-2: #131316;
      --surface: #18181b;
      --surface-2: #1f1f23;
      --border: rgba(255,255,255,0.05);
      --border-strong: rgba(255,255,255,0.1);
      --text: #fafafa;
      --text-2: rgba(250,250,250,0.62);
      --text-3: rgba(250,250,250,0.4);
      --text-4: rgba(250,250,250,0.28);
      --accent: #6366f1;
      --accent-soft: rgba(99,102,241,0.15);
      --accent-hover: #5457e0;
      --danger: #ef4444;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }
    * { box-sizing: border-box; }
    html, body { background: var(--bg); }
    body {
      margin: 0;
      font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      font-feature-settings: "cv11", "ss01";
      color: var(--text);
      letter-spacing: -0.01em;
      min-height: 100vh;
    }
    ::selection { background: var(--accent-soft); }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

    /* Header & tabs */
    .topnav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(12,12,14,0.85);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
    }
    .topnav-inner {
      max-width: 1180px; margin: 0 auto;
      padding: 12px 28px;
      display: flex; align-items: center; gap: 28px;
    }
    .brand {
      display: flex; align-items: center; gap: 9px;
      font-weight: 600; letter-spacing: -0.01em;
      font-size: 13px;
    }
    .brand .logo {
      width: 22px; height: 22px;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      border-radius: 6px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 12px;
    }
    .tabs { display: flex; gap: 2px; }
    .tab {
      background: transparent; border: none;
      color: var(--text-3);
      font: inherit; font-weight: 500;
      padding: 6px 12px; border-radius: var(--radius-sm);
      cursor: pointer;
      letter-spacing: -0.005em;
      transition: background 0.12s, color 0.12s;
    }
    .tab:hover { background: rgba(255,255,255,0.04); color: var(--text-2); }
    .tab.active { background: rgba(255,255,255,0.06); color: var(--text); }

    /* Centered page container */
    .page { max-width: 1180px; margin: 0 auto; padding: 24px 28px 60px; }

    /* ---------- QUOTES TAB ---------- */
    .quotes-app {
      display: grid; grid-template-columns: 220px minmax(0, 1fr);
      gap: 28px;
    }
    .quotes-app > main { min-width: 0; }
    aside {
      position: sticky; top: 64px;
      align-self: start;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      padding-right: 4px;
    }
    aside h2 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-4); margin: 16px 8px 6px; font-weight: 600;
    }
    aside h2:first-child { margin-top: 0; }
    .nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 12px;
      color: var(--text-2);
      transition: background 0.1s, color 0.1s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .nav-item.active { background: var(--accent-soft); color: var(--text); }
    .nav-item .label {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      flex: 1; min-width: 0; font-weight: 500;
    }
    .nav-item .badge {
      font-size: 10px; font-weight: 500;
      color: var(--text-3);
      font-feature-settings: "tnum";
      flex-shrink: 0;
    }
    .nav-item.active .badge { color: var(--text-2); }
    .folder-ico {
      width: 14px; height: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 12px; opacity: 0.6;
      flex-shrink: 0;
    }

    .topbar {
      display: flex; gap: 10px; align-items: center; margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .topbar h2 {
      margin: 0; font-size: 22px; font-weight: 600;
      letter-spacing: -0.02em;
    }
    .topbar .count { color: var(--text-3); font-size: 13px; font-feature-settings: "tnum"; }
    .topbar input[type=search] {
      flex: 1; max-width: 320px; margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius-md);
      padding: 7px 11px;
      font-family: inherit; font-size: 12px;
      transition: border-color 0.12s, background 0.12s;
    }
    .topbar input[type=search]::placeholder { color: var(--text-4); }
    .topbar input[type=search]:focus { outline: none; border-color: var(--accent); background: var(--surface-2); }
    .topbar select {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-2); border-radius: var(--radius-md);
      padding: 7px 9px; font-family: inherit; font-size: 12px;
      cursor: pointer;
    }
    .topbar select:focus { outline: none; border-color: var(--accent); }
    .topbar .export-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius-md);
      padding: 7px 11px; cursor: pointer;
      font-family: inherit; font-size: 12px; font-weight: 500;
      letter-spacing: -0.005em;
      display: inline-flex; align-items: center; gap: 6px;
      transition: background 0.12s, border-color 0.12s;
    }
    .topbar .export-btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
    .topbar .export-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .topbar .export-btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    /* Multi-select */
    .row .rcheck {
      width: 16px; height: 16px;
      border: 1.5px solid var(--border-strong);
      border-radius: 4px;
      flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background 0.12s, border-color 0.12s, opacity 0.12s;
      opacity: 0;
      background: transparent;
      cursor: pointer;
    }
    .row:hover .rcheck { opacity: 1; }
    .row.selected { background: rgba(99,102,241,0.08); }
    .row.selected .rcheck { opacity: 1; background: var(--accent); border-color: var(--accent); }
    .row.selected .rcheck::after { content: "✓"; color: #fff; font-size: 10px; line-height: 1; }
    .selectmode .row .rcheck { opacity: 1; }

    /* Nav export icon */
    .nav-item .nav-export {
      opacity: 0; cursor: pointer; flex-shrink: 0;
      color: var(--text-3);
      font-size: 11px; padding: 0 2px;
      transition: opacity 0.12s, color 0.12s;
    }
    .nav-item:hover .nav-export { opacity: 1; }
    .nav-item .nav-export:hover { color: var(--accent); }

    .group { margin-bottom: 18px; }
    .group-head {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px 8px;
      font-size: 11px; color: var(--text-3); font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .group-head .gtitle {
      color: var(--text-2); text-transform: none;
      letter-spacing: -0.005em; font-size: 12px; font-weight: 600;
    }
    .group-head .gopen {
      margin-left: auto; color: var(--text-3); cursor: pointer; text-decoration: none;
      text-transform: none; letter-spacing: 0; font-size: 12px;
      transition: color 0.12s;
    }
    .group-head .gopen:hover { color: var(--accent); }

    .list {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; cursor: pointer; font-size: 13px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
      min-width: 0;
    }
    .list { max-width: 100%; }
    .row:last-child { border-bottom: none; }
    .row:hover { background: rgba(255,255,255,0.025); }
    .row .swatch { width: 3px; height: 22px; border-radius: 2px; flex-shrink: 0; }
    .row .rtext {
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--text);
    }
    .row .ricons { font-size: 12px; color: var(--text-3); flex-shrink: 0; }
    .row .rtags { display: flex; gap: 4px; flex-shrink: 0; }
    .row .rtag {
      font-size: 10px; font-weight: 500;
      background: rgba(255,255,255,0.05); padding: 2px 7px; border-radius: 999px;
      color: var(--text-2); letter-spacing: -0.005em;
    }
    .row .rsite {
      font-size: 11px; color: var(--text-4);
      flex-shrink: 0; max-width: 160px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .empty {
      text-align: center; padding: 64px 20px;
      color: var(--text-3); font-size: 13px;
    }
    .empty .em-ico { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }
    .empty h3 {
      color: var(--text-2); font-weight: 500;
      font-size: 14px; margin: 0 0 4px;
    }

    /* Modal */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      display: none; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(6px);
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-bg.show { display: flex; }
    .modal {
      background: var(--bg-2);
      border: 1px solid var(--border-strong);
      border-radius: 14px;
      width: 480px; max-width: 92vw; max-height: 82vh;
      display: flex; flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 8px 16px rgba(0,0,0,0.3);
      animation: modalIn 0.18s cubic-bezier(0.2,0.8,0.2,1);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: none; }
    }
    .modal-head {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
    }
    .modal-head .mtitle {
      font-weight: 600; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-size: 13px; letter-spacing: -0.005em;
    }
    .modal-head .mclose {
      background: transparent; border: none; color: var(--text-3);
      cursor: pointer; font-size: 18px; line-height: 1;
      width: 26px; height: 26px; border-radius: 6px;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s;
    }
    .modal-head .mclose:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .modal-body { padding: 14px 16px; overflow-y: auto; }
    .m-text {
      padding: 10px 12px; border-radius: 6px;
      font-size: 14px; line-height: 1.55;
      margin-bottom: 14px; font-weight: 500;
    }
    .m-section-lbl {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-4); font-weight: 600;
      margin: 12px 0 6px;
    }
    .m-tags { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 999px; padding: 3px 9px;
      font-size: 11px; font-weight: 500; color: var(--text-2);
    }
    .chip .x {
      color: var(--text-4); cursor: pointer;
      font-size: 12px; line-height: 1;
      transition: color 0.12s;
    }
    .chip .x:hover { color: var(--danger); }
    .chip-input {
      background: transparent;
      border: 1px dashed rgba(255,255,255,0.12);
      border-radius: 999px; padding: 3px 9px;
      font-size: 11px; color: var(--text); font-family: inherit;
      width: 78px; outline: none;
      transition: border-color 0.12s;
    }
    .chip-input::placeholder { color: var(--text-4); }
    .chip-input:focus { border-style: solid; border-color: var(--accent); }
    .m-note {
      width: 100%;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text); padding: 10px 12px;
      font: inherit; font-size: 13px; line-height: 1.5;
      resize: vertical; min-height: 80px;
      transition: border-color 0.12s, background 0.12s;
    }
    .m-note::placeholder { color: var(--text-4); }
    .m-note:focus { outline: none; border-color: var(--accent); background: var(--surface-2); }
    .m-meta { font-size: 11px; color: var(--text-4); margin-top: 12px; font-feature-settings: "tnum"; }
    .modal-foot {
      display: flex; gap: 6px;
      padding: 12px 16px; border-top: 1px solid var(--border);
    }
    .mbtn {
      flex: 1;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius-md);
      padding: 8px 10px; cursor: pointer;
      font-size: 12px; font-weight: 500;
      font-family: inherit; letter-spacing: -0.005em;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .mbtn:hover { background: var(--surface-2); border-color: var(--border-strong); }
    .mbtn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .mbtn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .mbtn.danger { color: var(--text-2); }
    .mbtn.danger:hover { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.3); color: #fca5a5; }

    /* Confirm modal */
    #confirm-modal .cf-lead {
      font-size: 12px; color: var(--text-3);
      margin-bottom: 10px;
    }
    #confirm-modal .cf-preview {
      display: flex; gap: 8px; align-items: center;
      padding: 6px 10px;
      background: rgba(255,255,255,0.025);
      border-radius: var(--radius-sm);
      margin-bottom: 4px;
      font-size: 12px;
    }
    #confirm-modal .cf-bar {
      width: 3px; height: 14px; border-radius: 2px;
      flex-shrink: 0;
    }
    #confirm-modal .cf-text {
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--text-2);
    }
    #confirm-modal .cf-more {
      font-size: 11px; color: var(--text-4);
      padding: 4px 10px;
      font-style: italic;
    }
    #confirm-modal #confirm-ok:hover {
      filter: brightness(1.1);
    }
    /* Folder picker chips */
    #folder-existing { gap: 5px; }
    #folder-existing .chip {
      cursor: pointer;
      padding: 4px 11px;
      font-size: 12px;
      transition: background 0.12s, color 0.12s;
    }
    #folder-existing .chip:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text);
    }
    #folder-existing .chip.selected {
      background: var(--accent);
      color: #fff;
    }
    #folder-existing .empty {
      font-size: 12px; color: var(--text-4); font-style: italic;
    }
    #folder-new:focus { border-color: var(--accent); }

    /* ---------- DESIGN TAB ---------- */
    .design-page { max-width: 880px; margin: 0 auto; }
    .design-page header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 4px;
    }
    .design-page h1 {
      font-size: 18px; margin: 0; font-weight: 600;
      letter-spacing: -0.02em;
    }
    .design-page p.lead {
      color: var(--text-3); margin: 4px 0 22px 0;
      font-size: 13px;
    }
    .section-lbl {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-4); margin: 18px 0 8px; font-weight: 600;
    }
    .preview-strip {
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 16px 18px;
      margin-bottom: 6px; font-size: 14px; line-height: 1.7;
      color: var(--text-2);
    }
    .preview-strip span.mark { padding: 1px 4px; border-radius: 3px; font-weight: 500; }
    .presets { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
    .preset {
      cursor: pointer; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius-md);
      padding: 6px 10px; font-size: 12px; font-weight: 500;
      color: var(--text-2);
      display: flex; align-items: center; gap: 7px;
      font-family: inherit; letter-spacing: -0.005em;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .preset:hover { border-color: var(--accent); color: var(--text); background: var(--surface-2); }
    .preset .dots { display: flex; gap: 2px; }
    .preset .dot { width: 8px; height: 8px; border-radius: 2px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(208px, 1fr));
      gap: 8px; margin-bottom: 6px;
    }
    .card {
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 10px;
      position: relative;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--border-strong); }
    .card.dragging { opacity: 0.4; }
    .swatch-preview {
      border-radius: var(--radius-md);
      padding: 14px 12px; font-size: 14px; font-weight: 600;
      text-align: center; margin-bottom: 8px; letter-spacing: -0.01em;
    }
    .name-input {
      width: 100%; background: transparent; border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text); font-size: 12px; font-weight: 500;
      padding: 4px 0; margin-bottom: 8px;
      font-family: inherit; letter-spacing: -0.005em;
      transition: border-color 0.12s;
    }
    .name-input:focus { outline: none; border-color: var(--accent); }
    .color-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 0; font-size: 11px;
    }
    .color-row .label { color: var(--text-3); font-weight: 500; }
    .color-row .ctrl { display: flex; gap: 4px; align-items: center; }
    .color-row input[type=color] {
      width: 24px; height: 22px;
      border: 1px solid var(--border);
      border-radius: 5px; padding: 0; cursor: pointer; background: transparent;
    }
    .color-row input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
    .color-row input[type=color]::-webkit-color-swatch { border: none; border-radius: 3px; }
    .color-row input[type=text] {
      width: 72px; background: var(--surface);
      border: 1px solid var(--border); color: var(--text);
      border-radius: 5px; padding: 3px 6px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 10px;
      transition: border-color 0.12s, background 0.12s;
    }
    .color-row input[type=text]:focus { outline: none; border-color: var(--accent); background: var(--surface-2); }
    .card-actions {
      display: flex; gap: 4px; justify-content: space-between;
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .icon-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-2);
      border-radius: 5px; padding: 4px 8px; cursor: pointer;
      font-size: 11px; font-weight: 500; font-family: inherit;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .icon-btn:hover { background: var(--surface); color: var(--text); border-color: var(--border-strong); }
    .icon-btn.danger:hover {
      background: rgba(239,68,68,0.12); color: #fca5a5;
      border-color: rgba(239,68,68,0.3);
    }
    .add-card {
      background: transparent; border: 1px dashed var(--border-strong);
      border-radius: var(--radius-lg); color: var(--text-3);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 500; font-family: inherit;
      letter-spacing: -0.005em;
      min-height: 150px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .add-card:hover {
      border-color: var(--accent); color: var(--text);
      background: rgba(99,102,241,0.04);
    }
    .footbar {
      position: sticky; bottom: 0;
      margin-top: 16px;
      padding: 12px 0;
      background: rgba(12,12,14,0.92);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center;
    }
    .btn {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 7px 14px; cursor: pointer;
      font-size: 12px; font-weight: 500;
      font-family: inherit; letter-spacing: -0.005em;
      transition: background 0.12s, border-color 0.12s;
    }
    .btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .status {
      color: #4ade80; font-size: 12px; font-weight: 500;
      margin-left: 4px; opacity: 0; transition: opacity 0.3s;
    }
    .status.show { opacity: 1; }
    .spacer { flex: 1; }
    .hint { font-size: 11px; color: var(--text-4); }

    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
  <div class="topnav">
    <div class="topnav-inner">
      <div class="brand"><span class="logo">✦</span> Highlighter</div>
      <div class="tabs">
        <button class="tab active" data-tab="quotes">Quotes</button>
        <button class="tab" data-tab="design">Design</button>
      </div>
    </div>
  </div>

  <div class="page">
    <!-- Quotes panel -->
    <div class="panel active" id="panel-quotes">
      <div class="quotes-app">
        <aside>
          <h2>Library</h2>
          <div id="nav-main"></div>
          <h2>Folders</h2>
          <div id="nav-tags"></div>
          <h2>Sites</h2>
          <div id="nav-sites"></div>
        </aside>
        <main>
          <div class="topbar">
            <h2 id="view-title">All quotes</h2>
            <span class="count" id="view-count"></span>
            <input type="search" id="search" placeholder="Search quotes, notes, tags…">
            <select id="sort">
              <option value="newest">Newest</option>
              <option value="oldest">Oldest</option>
              <option value="site">By site</option>
            </select>
            <button class="export-btn" id="select-all" title="Select every quote in the current view">☑ Select all</button>
            <button class="export-btn" id="export-view" title="Export the current view as Markdown">⬇ Export</button>
          </div>
          <div id="results"></div>
        </main>
      </div>
    </div>

    <!-- Design panel -->
    <div class="panel" id="panel-design">
      <div class="design-page">
        <header>
          <h1>Design Studio</h1>
        </header>
        <p class="lead">Each swatch defines its own background and text color.</p>

        <div class="section-lbl">Live preview</div>
        <div class="preview-strip"><span id="sample"></span></div>

        <div class="section-lbl">Presets</div>
        <div class="presets" id="presets"></div>

        <div class="section-lbl">Palette</div>
        <div class="grid" id="grid"></div>

        <div class="footbar">
          <button class="btn primary" id="save">Save changes</button>
          <button class="btn" id="reset">Reset</button>
          <span class="status" id="status">✓ Saved</span>
          <span class="spacer"></span>
          <span class="hint">Drag cards to reorder</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Folder picker -->
  <div class="modal-bg" id="folder-bg">
    <div class="modal" id="folder-modal" style="width: 380px;">
      <div class="modal-head">
        <span class="mtitle" id="folder-title">Add to folder</span>
        <button class="mclose" id="folder-close">×</button>
      </div>
      <div class="modal-body">
        <div class="m-section-lbl">Existing folders</div>
        <div class="m-tags" id="folder-existing"></div>
        <div class="m-section-lbl" style="margin-top:14px;">Or create new</div>
        <input id="folder-new" type="text" placeholder="folder name" autocomplete="off"
               style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-md);padding:8px 10px;font:inherit;font-size:13px;outline:none;box-sizing:border-box;">
      </div>
      <div class="modal-foot">
        <button class="mbtn" id="folder-cancel">Cancel</button>
        <button class="mbtn primary" id="folder-apply">Apply</button>
      </div>
    </div>
  </div>

  <!-- Confirm modal -->
  <div class="modal-bg" id="confirm-bg">
    <div class="modal" id="confirm-modal" style="width: 380px;">
      <div class="modal-head">
        <span class="mtitle" id="confirm-title">Delete highlights?</span>
      </div>
      <div class="modal-body" id="confirm-body" style="padding-bottom: 6px;"></div>
      <div class="modal-foot">
        <button class="mbtn" id="confirm-cancel">Cancel</button>
        <button class="mbtn" id="confirm-ok" style="background:#ef4444;border-color:#ef4444;color:#fff;">Delete</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="modal-bg">
    <div class="modal" id="modal">
      <div class="modal-head">
        <span class="mtitle" id="m-title"></span>
        <button class="mclose" id="m-close">×</button>
      </div>
      <div class="modal-body">
        <div class="m-text" id="m-text"></div>
        <div class="m-section-lbl">Folders</div>
        <div class="m-tags" id="m-tags"></div>
        <div class="m-section-lbl">Comment</div>
        <textarea class="m-note" id="m-note" placeholder="Write a comment…"></textarea>
        <div class="m-meta" id="m-meta"></div>
      </div>
      <div class="modal-foot">
        <button class="mbtn primary" id="m-goto">Open source ↗</button>
        <button class="mbtn danger" id="m-del">Delete</button>
      </div>
    </div>
  </div>

  <script src="library.js"></script>
  <script src="options.js"></script>
  <script src="tabs.js"></script>
</body>
</html>
